# Traffic Light Service API - Development Configuration
# Spring Boot 3.2 Configuration

# ============================
# APPLICATION CONFIGURATION
# ============================
spring.application.name=traffic-light-service
spring.profiles.active=dev

# ============================
# SERVER CONFIGURATION
# ============================
server.port=9900
server.servlet.context-path=/
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
server.tomcat.connection-timeout=20000
server.tomcat.max-connections=8192
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# ============================
# DATABASE CONFIGURATION (DEV)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/traffic_light_dev?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=utf-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool Configuration
spring.datasource.hikari.pool-name=traffic-light-pool
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=true

# ============================
# JPA/HIBERNATE CONFIGURATION (DEV)
# ============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false
spring.jpa.properties.hibernate.generate_statistics=false

# ============================
# KAFKA CONFIGURATION
# ============================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.client-id=traffic-light-controller

# Producer Configuration
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.linger-ms=5
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.transaction-id-prefix=traffic-light-tx-
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.request.timeout.ms=30000

# Consumer Configuration
spring.kafka.consumer.group-id=traffic-light-controller
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.max-poll-records=100
spring.kafka.consumer.session-timeout-ms=30000
spring.kafka.consumer.heartbeat-interval-ms=10000
spring.kafka.consumer.isolation-level=read_committed
spring.kafka.consumer.properties.spring.json.trusted.packages=com.trafficlight.event
spring.kafka.consumer.properties.spring.json.type.mapping=stateChangedEvent:com.trafficlight.event.StateChangedEvent,intersectionUpdatedEvent:com.trafficlight.event.IntersectionUpdatedEvent,systemHealthEvent:com.trafficlight.event.SystemHealthEvent

# Admin Configuration
spring.kafka.admin.properties.bootstrap.servers=localhost:9092
spring.kafka.admin.properties.request.timeout.ms=30000

# ============================
# TRANSACTION CONFIGURATION
# ============================
spring.transaction.default-timeout=30s
spring.transaction.rollback-on-commit-failure=true

# ============================
# JACKSON CONFIGURATION
# ============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-empty-string-as-null-object=true
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSZ

# ============================
# ACTUATOR CONFIGURATION
# ============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,kafka,ratelimiters
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.kafka.enabled=true
management.health.db.enabled=true
management.health.ratelimiters.enabled=true
management.metrics.export.prometheus.enabled=true

# ============================
# RESILIENCE4J CONFIGURATION
# ============================
resilience4j.ratelimiter.configs.default.registerHealthIndicator=true
resilience4j.ratelimiter.configs.default.limitForPeriod=100
resilience4j.ratelimiter.configs.default.limitRefreshPeriod=1s
resilience4j.ratelimiter.configs.default.timeoutDuration=500ms
resilience4j.ratelimiter.instances.apiEndpoints.baseConfig=default
resilience4j.ratelimiter.instances.apiEndpoints.limitForPeriod=200
resilience4j.ratelimiter.instances.kafkaPublisher.baseConfig=default
resilience4j.ratelimiter.instances.kafkaPublisher.limitForPeriod=500

# ============================
# LOGGING CONFIGURATION (DEV)
# ============================
logging.level.com.trafficlight=DEBUG
logging.level.org.springframework.kafka=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
logging.file.name=E:/ws-world/traffic light system/logs/traffic-light-service.log
logging.file.max-size=10MB
logging.file.max-history=30

# ============================
# CUSTOM APPLICATION PROPERTIES
# ============================
# System Configuration
traffic-light.system.default-state-duration.red=30
traffic-light.system.default-state-duration.yellow=5
traffic-light.system.default-state-duration.green=25
traffic-light.system.max-intersections=1000
traffic-light.system.state-change-timeout=5000
traffic-light.system.validation-enabled=true

# Thread Pool Configuration
traffic-light.thread-pool.core-size=10
traffic-light.thread-pool.max-size=50
traffic-light.thread-pool.queue-capacity=100
traffic-light.thread-pool.keep-alive-seconds=60
traffic-light.thread-pool.thread-name-prefix=traffic-light-

# Cache Configuration
traffic-light.cache.enabled=true
traffic-light.cache.ttl=300
traffic-light.cache.max-size=1000

# Analytics Configuration
traffic-light.analytics.enabled=true
traffic-light.analytics.batch-size=100
traffic-light.analytics.flush-interval=30000
traffic-light.analytics.retention-days=90

# Rate Limiting Configuration
traffic-light.rate-limiting.enabled=false

# ============================
# KAFKA TOPICS CONFIGURATION
# ============================
# Core Events
kafka.topics.state-changed=traffic-light-state-changed
kafka.topics.intersection-updated=intersection-updated
kafka.topics.sequence-activated=light-sequence-activated
kafka.topics.sequence-deactivated=light-sequence-deactivated

# System Events
kafka.topics.health-check=system-health-check
kafka.topics.error-events=system-error-events
kafka.topics.audit-events=system-audit-events

# Analytics
kafka.topics.traffic-metrics=analytics-traffic-metrics
kafka.topics.performance-data=analytics-performance-data
kafka.topics.state-transitions=analytics-state-transitions

# Configuration
kafka.topics.timing-updated=config-timing-updated
kafka.topics.rules-changed=config-rules-changed
kafka.topics.intersection-settings=config-intersection-settings

# Dead Letter Topics
kafka.topics.state-changed-dlt=traffic-light-state-changed-DLT
kafka.topics.intersection-updated-dlt=intersection-updated-DLT
kafka.topics.system-events-dlt=system-events-DLT

# ============================
# CORS CONFIGURATION
# ============================
cors.allowed-origins=*
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=false
cors.max-age=3600