spring:
  application:
    name: traffic-light-controller-test
  
  # Database configuration for testing
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  # JPA configuration for testing
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        
  # H2 Console for testing (optional)
  h2:
    console:
      enabled: true
      path: /h2-console
      
  # Kafka configuration for testing (embedded)
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: traffic-light-controller-test
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      transaction-id-prefix: traffic-light-test-tx-
      
# Logging configuration for tests
logging:
  level:
    com.trafficlight: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
    org.hibernate: WARN
    
# Disable Kafka for tests if needed
management:
  endpoints:
    web:
      exposure:
        include: health,info